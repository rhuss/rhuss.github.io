<script>
  // Use custom CSS themes on production, built-in themes on localhost
  const isLocal = window.location.hostname === 'localhost';
  const baseUrl = window.location.origin;
  const isDark = document.documentElement.classList.contains('dark');

  function getTheme(dark) {
    if (isLocal) return dark ? 'noborder_dark' : 'noborder_light';
    return dark
      ? baseUrl + '/giscus-custom-dark.css'
      : baseUrl + '/giscus-custom-light.css';
  }

  const script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.setAttribute('data-repo', 'rhuss/rhuss.github.io');
  script.setAttribute('data-repo-id', 'MDEwOlJlcG9zaXRvcnkxMTk0ODExNw==');
  script.setAttribute('data-category-id', 'DIC_kwDOALZQVc4C6A6v');
  script.setAttribute('data-mapping', 'pathname');
  script.setAttribute('data-strict', '0');
  script.setAttribute('data-reactions-enabled', '1');
  script.setAttribute('data-emit-metadata', '0');
  script.setAttribute('data-input-position', 'top');
  script.setAttribute('data-theme', getTheme(isDark));
  script.setAttribute('data-lang', 'en');
  script.setAttribute('crossorigin', 'anonymous');
  script.async = true;
  document.currentScript.parentElement.appendChild(script);

  // Sync theme when Blowfish toggles dark mode
  const observer = new MutationObserver(() => {
    const iframe = document.querySelector('iframe.giscus-frame');
    if (iframe) {
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: getTheme(document.documentElement.classList.contains('dark')) } } },
        'https://giscus.app'
      );
    }
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
</script>
